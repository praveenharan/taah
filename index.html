<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Dashboard</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; }
        #sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; }
        .week-header { padding: 15px; cursor: pointer; border-bottom: 1px solid #34495e; font-weight: bold; background: #34495e; }
        .week-header:hover { background: #3d566e; }
        .days-container { display: none; background: #34495e; }
        .days-container.active { display: block; }
        .day-item { padding: 10px 30px; cursor: pointer; border-bottom: 1px solid #2c3e50; }
        .day-item:hover { background: #4e6a85; }
        
        #content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .flashcard { width: 500px; padding: 40px; border: 2px solid #3498db; border-radius: 10px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar"></div>
<div id="content">
    <h2 id="display-area">Select a Week and Day</h2>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const displayArea = document.getElementById('display-area');

    for (let w = 1; w <= 7; w++) {
        // Create Week Header
        let weekDiv = document.createElement('div');
        weekDiv.className = 'week-header';
        weekDiv.innerText = `Week ${w}`;
        
        // Create Days Container
        let daysDiv = document.createElement('div');
        daysDiv.className = 'days-container';
        
        for (let d = 1; d <= 7; d++) {
            let dayItem = document.createElement('div');
            dayItem.className = 'day-item';
            dayItem.innerText = `Day ${d}`;
            dayItem.onclick = () => displayArea.innerHTML = `<h1>Week ${w} - Day ${d}</h1><div class="flashcard">20 Flashcards will appear here</div>`;
            daysDiv.appendChild(dayItem);
        }

        // Accordion Logic
        weekDiv.onclick = () => {
            document.querySelectorAll('.days-container').forEach(el => el.classList.remove('active'));
            daysDiv.classList.add('active');
        };

        sidebar.appendChild(weekDiv);
        sidebar.appendChild(daysDiv);
    }
</script>
</body>
</html>
