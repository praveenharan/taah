<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Dashboard</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; }
        /* Sidebar Navigation */
        #sidebar { width: 200px; height: 100vh; background: #333; color: white; padding: 20px; }
        .nav-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #555; }
        .nav-item:hover { background: #444; }
        
        /* Main Content Area */
        #content { flex-grow: 1; padding: 40px; }
        .week-section { display: none; }
        .week-section.active { display: block; }
        
        .card { 
            background: #f9f9f9; border: 1px solid #ddd; padding: 20px; 
            margin: 10px 0; border-radius: 8px; cursor: pointer;
        }
        .answer { display: none; margin-top: 10px; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Weeks</h3>
        <div id="menu"></div>
    </div>

    <div id="content">
        <h1 id="current-title">Select a Week</h1>
        <div id="flashcards"></div>
    </div>

    <script>
        const studyPlan = {
            "Week 1": ["Day 1 Topic", "Day 2 Topic", "Day 3 Topic", "Day 4 Topic", "Day 5 Topic", "Day 6 Topic", "Day 7 Topic"],
            "Week 2": ["Day 8 Topic", "Day 9 Topic", "Day 10 Topic", "Day 11 Topic", "Day 12 Topic", "Day 13 Topic", "Day 14 Topic"]
            // Add Weeks 3-7 here...
        };

        const menu = document.getElementById('menu');
        const flashcards = document.getElementById('flashcards');
        const title = document.getElementById('current-title');

        for (const week in studyPlan) {
            // Create Sidebar Link
            let link = document.createElement('div');
            link.className = 'nav-item';
            link.innerText = week;
            link.onclick = () => showWeek(week);
            menu.appendChild(link);
        }

        function showWeek(week) {
            title.innerText = week;
            flashcards.innerHTML = '';
            studyPlan[week].forEach((day, index) => {
                let card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `${day} <div class="answer" id="ans-${index}">Answer details here...</div>`;
                card.onclick = () => {
                    let ans = card.querySelector('.answer');
                    ans.style.display = (ans.style.display === 'block') ? 'none' : 'block';
                };
                flashcards.appendChild(card);
            });
        }
    </script>
</body>
</html>
