<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>7-Week Learning Dashboard</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; background: #f4f7f6; }
        #sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; }
        .week-header { padding: 15px; cursor: pointer; background: #34495e; border-bottom: 1px solid #2c3e50; font-weight: bold; }
        .days-container { display: none; background: #3e5871; }
        .days-container.active { display: block; }
        .day-item { padding: 10px 30px; cursor: pointer; border-bottom: 1px solid #34495e; }
        .day-item:hover { background: #4e6a85; }
        
        #content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .flashcard { 
            width: 450px; height: 250px; background: white; border: 2px solid #3498db; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            text-align: center; cursor: pointer; font-size: 1.3rem; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .nav-btns { margin-top: 20px; display: flex; gap: 20px; }
        button { padding: 10px 20px; cursor: pointer; }

        /* Add to your existing <style> */
        @media (max-width: 600px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 200px; }
            .flashcard { width: 90%; height: 200px; font-size: 1rem; }
        }
        
        /* Ensure the flashcard container is flexible */
        #card-display { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
        }
    </style>
</head>
<body>

<div id="sidebar"></div>
<div id="content">
    <h2 id="current-title">Select a Day to Start</h2>
    <div id="card-display"></div>
    <div id="nav-btns" class="nav-btns" style="display:none;">
        <button onclick="changeCard(-1)">Previous</button>
        <button onclick="changeCard(1)">Next</button>
    </div>
</div>

    let currentW, currentD, currentIndex = 0, isFlipped = false;

    const sidebar = document.getElementById('sidebar');
    const cardDisplay = document.getElementById('card-display');
    const navBtns = document.getElementById('nav-btns');
    const title = document.getElementById('current-title');

    // Build Accordion
    for (let w = 1; w <= 7; w++) {
        let week = `Week ${w}`;
        if (!flashcardData[week]) continue; 
        let header = document.createElement('div');
        header.className = 'week-header';
        header.innerText = week;
        let container = document.createElement('div');
        container.className = 'days-container';

        for (let d = 1; d <= 7; d++) {
            let day = document.createElement('div');
            day.className = 'day-item';
            day.innerText = `Day ${d}`;
            day.onclick = () => loadSession(week, `Day ${d}`);
            container.appendChild(day);
        }

        header.onclick = () => {
            document.querySelectorAll('.days-container').forEach(el => el.classList.remove('active'));
            container.classList.add('active');
        };
        sidebar.appendChild(header);
        sidebar.appendChild(container);
    }

    function loadSession(w, d) {
        currentW = w; currentD = d; currentIndex = 0; isFlipped = false;
        title.innerText = `${w} - ${d}`;
        navBtns.style.display = 'flex';
        renderCard();
    }

    function renderCard() {
        let card = flashcardData[currentW][currentD][currentIndex];
        cardDisplay.innerHTML = `<div class="flashcard" onclick="flip()">
            ${isFlipped ? card.a : card.q}
        </div>`;
    }

    function flip() { isFlipped = !isFlipped; renderCard(); }

    function renderCard() {
    const cards = flashcardData[currentW][currentD];
    const card = cards[currentIndex];
    
    cardDisplay.innerHTML = `
        <div style="margin-bottom: 10px; font-weight: bold;">
            Question ${currentIndex + 1} / ${cards.length}
        </div>
        <div class="flashcard" onclick="flip()">
            ${isFlipped ? card.a : card.q}
        </div>
    `;
}

function changeCard(dir) {
    const cards = flashcardData[currentW][currentD];
    // Uses the actual length of the array instead of a hardcoded 20
    currentIndex = (currentIndex + dir + cards.length) % cards.length;
    isFlipped = false;
    renderCard();
}
