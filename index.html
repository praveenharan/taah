<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azure Data Engineering Study Center</title>
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; height: 100vh; }
        #sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; overflow-y: auto; }
        .week-title { cursor: pointer; padding: 10px; font-weight: bold; }
        .day-item { padding: 5px 20px; cursor: pointer; color: #bdc3c7; }
        .day-item:hover { color: white; }
        
        #content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f4f7f6; }
        .flashcard { 
            width: 400px; height: 250px; background: white; border: 2px solid #3498db;
            display: flex; align-items: center; justify-content: center; text-align: center;
            cursor: pointer; border-radius: 15px; font-size: 1.2rem; padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="sidebar"></div>
<div id="content">
    <h2 id="status">Select a Day to Begin</h2>
    <div id="card-area"></div>
</div>

<script>
    // Structure: 7 Weeks, 7 Days each, 20 Cards per day
    const flashcardData = {
        "Week 1": {
            "Day 1": Array.from({length: 20}, (_, i) => ({q: `Q${i+1}: Storage Concept`, a: `Answer for Q${i+1}`}))
        }
        // Repeat this structure for all weeks and days
    };

    let currentCards = [];
    let currentIndex = 0;
    let showingAnswer = false;

    const sidebar = document.getElementById('sidebar');
    const cardArea = document.getElementById('card-area');
    const status = document.getElementById('status');

    // Build Menu
    for(let w=1; w<=7; w++) {
        let week = `Week ${w}`;
        sidebar.innerHTML += `<div class="week-title">${week}</div>`;
        for(let d=1; d<=7; d++) {
            let day = `Day ${d}`;
            let el = document.createElement('div');
            el.className = 'day-item';
            el.innerText = day;
            el.onclick = () => loadDay(week, day);
            sidebar.appendChild(el);
        }
    }

    function loadDay(w, d) {
        currentCards = flashcardData[w]?.[d] || [{q: "No cards yet", a: "Add data to JS"}];
        currentIndex = 0;
        showingAnswer = false;
        status.innerText = `${w} - ${d}`;
        renderCard();
    }

    function renderCard() {
        let card = currentCards[currentIndex];
        cardArea.innerHTML = `<div class="flashcard" onclick="flipCard()">
            ${showingAnswer ? card.a : card.q}
        </div>`;
    }

    function flipCard() {
        showingAnswer = !showingAnswer;
        renderCard();
    }
</script>
</body>
</html>
